<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lakers Roster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <div class="header-brand">
                <span class="brand-badge">2025–26</span>
                <h1 class="brand-title">Lakers Roster</h1>
            </div>
            <button class="btn-add" id="btnAdd">+ Add Player</button>
        </div>
    </header>

    <div class="toolbar">
        <div class="toolbar-inner">
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 20 20" fill="none">
                    <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5" />
                    <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search player…" />
            </div>
            <div class="filter-wrap">
                <button class="filter-btn active" data-pos="ALL">All</button>
                <button class="filter-btn" data-pos="PG">PG</button>
                <button class="filter-btn" data-pos="SG">SG</button>
                <button class="filter-btn" data-pos="SF">SF</button>
                <button class="filter-btn" data-pos="PF">PF</button>
                <button class="filter-btn" data-pos="C">C</button>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="players-grid" id="playersGrid"></div>
        <div class="empty-state hidden" id="emptyState">
            <p>No players found.</p>
        </div>
    </main>

    <!-- MODAL OVERLAY -->
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modalClose">✕</button>
            <h2 class="modal-title" id="modalTitle">Add Player</h2>

            <form class="modal-form" id="playerForm">
                <input type="hidden" id="playerId" />

                <div class="form-row">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="fieldName" placeholder="LeBron James" required />
                    </div>
                    <div class="form-group">
                        <label>Team</label>
                        <input type="text" id="fieldTeam" placeholder="Los Angeles Lakers" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Position</label>
                        <select id="fieldPosition" required>
                            <option value="">Select…</option>
                            <option value="PG">PG</option>
                            <option value="SG">SG</option>
                            <option value="SF">SF</option>
                            <option value="PF">PF</option>
                            <option value="C">C</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Jersey #</label>
                        <input type="number" id="fieldJersey" placeholder="23" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="fieldAge" placeholder="30" required />
                    </div>
                    <div class="form-group">
                        <label>Nationality</label>
                        <input type="text" id="fieldNationality" placeholder="USA" required />
                    </div>
                </div>

                <div class="form-row form-row--three">
                    <div class="form-group">
                        <label>PPG</label>
                        <input type="number" step="0.1" id="fieldPPG" placeholder="0.0" />
                    </div>
                    <div class="form-group">
                        <label>APG</label>
                        <input type="number" step="0.1" id="fieldAPG" placeholder="0.0" />
                    </div>
                    <div class="form-group">
                        <label>RPG</label>
                        <input type="number" step="0.1" id="fieldRPG" placeholder="0.0" />
                    </div>
                </div>

                <!-- Image upload (only shown when editing) -->
                <div class="form-group image-upload-group hidden" id="imageUploadGroup">
                    <label>Photo</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <img id="imagePreview" class="image-preview hidden" src="" alt="preview" />
                        <div class="image-upload-placeholder" id="imagePlaceholder">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M12 16V8m0 0l-3 3m3-3l3 3" stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round" />
                                <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor"
                                    stroke-width="1.5" />
                            </svg>
                            <span>Click to upload image</span>
                        </div>
                        <input type="file" id="fieldImage" accept="image/jpeg,image/png,image/webp" />
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
                    <button type="submit" class="btn-save" id="btnSave">Save Player</button>
                </div>
            </form>
        </div>
    </div>

    <!-- DELETE CONFIRM -->
    <div class="modal-overlay hidden" id="deleteOverlay">
        <div class="modal modal--sm">
            <h2 class="modal-title">Delete Player</h2>
            <p class="modal-text" id="deleteText">Are you sure?</p>
            <div class="form-actions">
                <button class="btn-cancel" id="btnDeleteCancel">Cancel</button>
                <button class="btn-delete" id="btnDeleteConfirm">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
