<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jugadores de la NBA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/card.css" />
    <link rel="stylesheet" href="css/modal.css" />
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="header-brand">
                <span class="brand-badge">2025–26</span>
                <h1 class="brand-title">Jugadores de la NBA</h1>
            </div>
            <div class="header-actions">
                <button class="btn-export" id="btnExport">↓ Exportar CSV</button>
                <button class="btn-add" id="btnAdd">+ Agregar Jugador</button>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <div class="toolbar-inner">
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 20 20" fill="none">
                    <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5" />
                    <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar jugador..." />
            </div>

            <div class="filter-wrap">
                <button class="filter-btn active" data-pos="ALL">Todos</button>
                <button class="filter-btn" data-pos="PG">PG</button>
                <button class="filter-btn" data-pos="SG">SG</button>
                <button class="filter-btn" data-pos="SF">SF</button>
                <button class="filter-btn" data-pos="PF">PF</button>
                <button class="filter-btn" data-pos="C">C</button>
            </div>

            <div class="sort-wrap">
                <select id="sortSelect" class="sort-select">
                    <option value="">Ordenar por…</option>
                    <option value="name">Nombre</option>
                    <option value="age">Edad</option>
                    <option value="points_per_game">PPG</option>
                    <option value="assists_per_game">APG</option>
                    <option value="rebounds_per_game">RPG</option>
                    <option value="jersey_number">Jersey #</option>
                </select>
                <select id="orderSelect" class="sort-select">
                    <option value="asc">Asc</option>
                    <option value="desc">Desc</option>
                </select>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="players-grid" id="playersGrid"></div>
        <div class="empty-state hidden" id="emptyState">
            <p>No se encontraron jugadores.</p>
        </div>
        <div class="pagination" id="pagination">
            <button class="pagination-btn" id="btnPrev">← Anterior</button>
            <span class="pagination-info" id="pageInfo">Página 1</span>
            <button class="pagination-btn" id="btnNext">Siguiente →</button>
        </div>
    </main>

    <!-- Player modal -->
    <div class="modal-overlay hidden" id="playerOverlay">
        <div class="modal">
            <button class="modal-close" id="btnPlayerClose">✕</button>
            <h2 class="modal-title" id="playerModalTitle">Agregar Jugador</h2>
            <form class="modal-form" id="playerForm">
                <input type="hidden" id="fieldId" />

                <div class="form-row">
                    <div class="form-group">
                        <label for="fieldName">Name</label>
                        <input type="text" id="fieldName" placeholder="LeBron James" required />
                    </div>
                    <div class="form-group">
                        <label for="fieldTeam">Team</label>
                        <input type="text" id="fieldTeam" placeholder="Los Angeles Lakers" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fieldPosition">Posición</label>
                        <select id="fieldPosition" required>
                            <option value="">Selecciona…</option>
                            <option value="PG">PG — Point Guard</option>
                            <option value="SG">SG — Shooting Guard</option>
                            <option value="SF">SF — Small Forward</option>
                            <option value="PF">PF — Power Forward</option>
                            <option value="C">C — Center</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fieldJersey">Jersey #</label>
                        <input type="number" id="fieldJersey" placeholder="23" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fieldAge">Edad</label>
                        <input type="number" id="fieldAge" placeholder="30" required />
                    </div>
                    <div class="form-group">
                        <label for="fieldNationality">Nacionalidad</label>
                        <input type="text" id="fieldNationality" placeholder="USA" required />
                    </div>
                </div>

                <div class="form-row form-row--three">
                    <div class="form-group">
                        <label for="fieldPPG">PPG</label>
                        <input type="number" step="0.1" id="fieldPPG" placeholder="0.0" />
                    </div>
                    <div class="form-group">
                        <label for="fieldAPG">APG</label>
                        <input type="number" step="0.1" id="fieldAPG" placeholder="0.0" />
                    </div>
                    <div class="form-group">
                        <label for="fieldRPG">RPG</label>
                        <input type="number" step="0.1" id="fieldRPG" placeholder="0.0" />
                    </div>
                </div>

                <div class="form-group hidden" id="imageUploadGroup">
                    <label>Photo</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <img id="imagePreview" class="image-preview hidden" src="" alt="preview" />
                        <div class="image-upload-placeholder" id="imagePlaceholder">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M12 16V8m0 0l-3 3m3-3l3 3" stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round" />
                                <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor"
                                    stroke-width="1.5" />
                            </svg>
                            <span>Click para subir imágen</span>
                        </div>
                        <input type="file" id="fieldImage" accept="image/jpeg,image/png,image/webp" />
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="btnPlayerCancel">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar Jugador</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete modal -->
    <div class="modal-overlay hidden" id="deleteOverlay">
        <div class="modal modal--sm">
            <button class="modal-close" id="btnDeleteClose">✕</button>
            <h2 class="modal-title">Borrar Jugador</h2>
            <p class="modal-text" id="deleteText"></p>
            <div class="form-actions">
                <button class="btn-cancel" id="btnDeleteCancel">Cancelar</button>
                <button class="btn-delete" id="btnDeleteConfirm">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/render.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
